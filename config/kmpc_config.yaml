# ==================================================================
/**: # This will put all the parameters in every node
  ros__parameters:
    uuv_name: 'xplorer_mini'

    model_name: 'edmdc'  # 'dmdc', 'edmdc', or 'deep vanilla'
    
    integral_limit: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5]  # Integral windup limits for each DOF
    max_vel: [1.0, 1.0, 0.5, 0.25, 0.25, 0.5]  # Max velocity limits for each DOF

    # Position Loop PID Gains
    Kp_pos: [0.5, 0.5, 0.7, 1.1, 1.31, 1.5]
    Ki_pos: [0.021, 0.036, 0.005, 0.36, 0.43, 0.05]
    Kd_pos: [0.01, 0.015, 0.03, 0.015, 0.0, 0.0]
    
    # MPC Weights
    N_horizon: 20
    rho_penalty: 1.0  # Penalty on slack variables for soft constraints
    Q_diag: [1.15, 1.15, 1.15, 1.0, 1.0, 1.0]
    R_diag: [0.15,0.15,0.5,0.25,0.25,0.25]
    R_rate_diag: [0.1, 0.1, 0.1, 0.05, 0.05, 0.05]  # Penalty on rate of change of control inputs

    max_tau: [100.0, 100.0, 100.0, 100.0, 100.0, 100.0]  # Max control input limits for each DOF
    max_delta_tau: [20.0, 20.0, 20.0, 20.0, 20.0, 20.0]  # Max change in control input per time step

    # DMDc gain
    # Q_diag: [1.15, 1.15, 1.15, 1.0, 1.0, 1.0]
    # R_diag: [0.15,0.15,0.5,0.25,0.25,0.25]
    # R_rate_diag: [0.1, 0.1, 0.1, 0.05, 0.05, 0.05]  # Penalty on rate of change of control inputs